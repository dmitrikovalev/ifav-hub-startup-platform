services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: startup_platform_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: startupdb
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker-init:/docker-entrypoint-initdb.d   # auto-runs *.sql on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d startupdb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
